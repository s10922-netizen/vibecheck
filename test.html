<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>VibeCheck</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sp:#1DB954;--bg:#090909;--bg2:#131313;--bg3:#1c1c1c;--bg4:#252525;--t:#fff;--t2:#b3b3b3;--t3:#555;--nav:70px}
html,body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
.scr{display:none;height:100vh;flex-direction:column}
.scr.on{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:40px 22px 10px;flex-shrink:0;background:var(--bg)}
.page{display:none;flex:1;overflow-y:auto !important;padding-bottom:100px;-webkit-overflow-scrolling:touch}
.page.on{display:flex;flex-direction:column}
.pill-wrap{padding:10px 22px;background:var(--bg);overflow-x:auto;display:flex;gap:8px;flex-shrink:0}
.pill{padding:8px 18px;border-radius:50px;border:none;background:var(--bg3);color:var(--t2);font-weight:700;white-space:nowrap;cursor:pointer}
.pill.on{background:var(--sp);color:#000}
.hero{padding:20px;text-align:center}
#ctr{font-size:70px;font-weight:900;letter-spacing:-3px}
.alist,.tlist{padding:0 22px}
.ar,.tr,.lb-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid var(--bg3)}
.ai,.ti{width:48px;height:48px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.ai img,.ti img{width:100%;height:100%;object-fit:cover}
.bnav{position:fixed;bottom:0;width:100%;height:var(--nav);background:rgba(0,0,0,0.9);display:flex;border-top:1px solid var(--bg3);z-index:999}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);background:none;border:none;font-size:10px}
.bn.on{color:var(--sp)}
.bn svg{width:24px;height:24px;margin-bottom:4px;stroke:currentColor;fill:none;stroke-width:2}
.lb-save-btn{width:calc(100% - 44px);padding:15px;background:var(--sp);color:#000;border-radius:50px;border:none;font-weight:800;margin:15px 22px;cursor:pointer}
.lb-row.me{background:rgba(29,185,84,0.1)}
@keyframes fi{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="scr" style="justify-content:center;align-items:center;text-align:center">
  <h1 style="font-size:40px;margin-bottom:20px">VibeCheck 🛰️</h1>
  <button onclick="doLogin()" style="background:var(--sp);color:#000;padding:15px 35px;border-radius:50px;border:none;font-weight:900;cursor:pointer">CONNECT SPOTIFY</button>
</div>

<!-- APP -->
<div id="s-app" class="scr">
  <div class="topbar">
    <b style="font-size:22px">VibeCheck</b>
    <div id="u-av" style="width:35px;height:35px;border-radius:50%;background:#333;overflow:hidden"></div>
  </div>

  <div class="pill-wrap">
    <button class="pill" onclick="onTab(this,'week')">Week</button>
    <button class="pill" onclick="onTab(this,'month')">4 Weeks</button>
    <button class="pill" onclick="onTab(this,'medium')">6 Months</button>
    <button class="pill on" onclick="onTab(this,'year')">All Time</button>
  </div>

  <!-- HOME -->
  <div class="page on" id="pg-home">
    <div class="hero">
      <div id="ctr">0</div>
      <div style="color:var(--sp);font-weight:800;letter-spacing:1px">VIBE POINTS</div>
      <div id="vtag" style="margin-top:15px;background:var(--bg3);padding:8px 15px;border-radius:50px;display:inline-block">🎵 Calculating...</div>
    </div>
    <div style="padding:20px 22px 10px;font-weight:900;color:var(--t2)">TOP ARTISTS</div>
    <div id="ar-list" class="alist"></div>
    <div style="padding:30px 22px 10px;font-weight:900;color:var(--t2)">TOP TRACKS</div>
    <div id="home-tlist" class="tlist"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="page" id="pg-leaderboard">
    <div style="padding:22px">
      <h2 style="margin-bottom:15px">Leaderboard</h2>
      <input id="lb-status-input" placeholder="What's your vibe right now?" style="width:100%;padding:15px;background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;color:#fff;outline:none">
    </div>
    <button class="lb-save-btn" id="lb-save-btn" onclick="saveMyScore()">💾 SAVE MY SCORE</button>
    <div id="lb-msg" style="text-align:center;color:var(--sp);font-size:12px;margin-bottom:10px"></div>
    <div id="lb-list"></div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="pg-profile">
    <div style="text-align:center;padding:50px 20px">
      <div id="p-av" style="width:120px;height:120px;border-radius:50%;background:#222;margin:0 auto 20px;overflow:hidden;border:3px solid var(--sp)"></div>
      <h2 id="p-nm">Loading...</h2>
      <p id="p-id" style="color:var(--t2);margin-bottom:30px">@username</p>
      
      <div style="display:grid;gap:12px;max-width:300px;margin:0 auto">
        <div style="background:var(--bg2);padding:15px;border-radius:15px;text-align:left">
          <small style="color:var(--t3)">PLAN</small>
          <div id="p-plan" style="font-weight:700;font-size:18px">—</div>
        </div>
        <div style="background:var(--bg2);padding:15px;border-radius:15px;text-align:left">
          <small style="color:var(--t3)">COUNTRY</small>
          <div id="p-ctry" style="font-weight:700;font-size:18px">—</div>
        </div>
      </div>
      
      <button onclick="logout()" style="margin-top:40px;color:#ff4444;background:none;border:none;font-weight:800;cursor:pointer">LOG OUT</button>
    </div>
  </div>

  <div class="bnav">
    <button class="bn on" id="bn-home" onclick="goPage('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</button>
    <button class="bn" id="bn-leaderboard" onclick="goPage('leaderboard')"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Ranks</button>
    <button class="bn" id="bn-profile" onclick="goPage('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</button>
  </div>
</div>

<script>
const CLIENT_ID = '22a39828c40d4acc8e50f21daaf65639';
const REDIRECT_URI = 'https://s10922-netizen.github.io/vibecheck/test.html';

firebase.initializeApp({
    apiKey: 'AIzaSyBZaTbDIyXOtyLPEtJLLbdOw8L4eSmiNqY',
    databaseURL: 'https://vibecheck-app-7e557-default-rtdb.europe-west1.firebasedatabase.app/'
});
const _db = firebase.database();

let _token = localStorage.getItem('tok');
let _profData = null;
const _tabCache = {};

function doLogin() {
    const scope = 'user-read-private user-read-email user-top-read';
    location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
}

async function spApi(path) {
    const r = await fetch('https://api.spotify.com/v1' + path, { headers: { Authorization: 'Bearer ' + _token } });
    if (r.status === 401) { logout(); return; }
    return r.json();
}

async function loadData(tab) {
    const range = tab === 'year' ? 'long_term' : (tab === 'medium' ? 'medium_term' : 'short_term');
    const [t, a] = await Promise.all([spApi(`/me/top/tracks?time_range=${range}&limit=50`), spApi(`/me/top/artists?time_range=${range}&limit=10`)]);
    const pts = t.items.reduce((acc, tr, i) => acc + (50 - i) * 1200, 0);
    _tabCache[tab] = { tracks: t.items, artists: a.items, pts };
    render(tab);
}

function render(tab) {
    const d = _tabCache[tab];
    document.getElementById('ctr').textContent = d.pts.toLocaleString();
    document.getElementById('vtag').textContent = d.pts > 200000 ? '👑 Music Legend' : '🎧 Vibe Explorer';
    
    document.getElementById('ar-list').innerHTML = d.artists.map((a, i) => `
        <div class="ar"><div class="ai"><img src="${a.images[0].url}"></div><div style="flex:1"><b>${a.name}</b></div><div style="color:var(--sp);font-weight:800">${(10-i)*100}</div></div>
    `).join('');
    
    document.getElementById('home-tlist').innerHTML = d.tracks.map((t, i) => `
        <div class="tr"><div class="ti"><img src="${t.album.images[0].url}"></div><div style="flex:1"><b>${t.name}</b><br><small style="color:var(--t2)">${t.artists[0].name}</small></div></div>
    `).join('');
}

async function saveMyScore() {
    if (!_tabCache['year'] || !_profData) return;
    const uid = _profData.id;
    await _db.ref('scores/' + uid).update({
        name: _profData.display_name,
        score: _tabCache['year'].pts,
        status: document.getElementById('lb-status-input').value || "Vibing",
        updatedAt: Date.now()
    });
    document.getElementById('lb-msg').textContent = '✅ Score Saved!';
    startLeaderboard();
}

function startLeaderboard() {
    _db.ref('scores').on('value', snap => {
        const rows = [];
        snap.forEach(c => rows.push({ uid: c.key, ...c.val() }));
        rows.sort((a, b) => b.score - a.score);
        document.getElementById('lb-list').innerHTML = rows.map((r, i) => `
            <div class="lb-row ${r.uid === _profData?.id ? 'me' : ''}">
                <b style="width:25px">${i+1}</b>
                <div style="flex:1"><b>${r.name}</b><br><small style="color:var(--t2)">${r.status||''}</small></div>
                <b style="color:var(--sp)">${(r.score||0).toLocaleString()}</b>
            </div>
        `).join('');
    });
}

function goPage(nm) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
    document.getElementById('pg-' + nm).classList.add('on');
    document.getElementById('bn-' + nm).classList.add('on');
    if (nm === 'leaderboard') startLeaderboard();
    if (nm === 'profile') fillProfile();
}

function fillProfile() {
    if (!_profData) return;
    document.getElementById('p-av').innerHTML = `<img src="${_profData.images[0].url}" style="width:100%;height:100%;object-fit:cover">`;
    document.getElementById('p-nm').textContent = _profData.display_name;
    document.getElementById('p-id').textContent = '@' + _profData.id;
    document.getElementById('p-plan').textContent = _profData.product.toUpperCase();
    document.getElementById('p-ctry').textContent = _profData.country;
}

function onTab(el, tab) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    el.classList.add('on');
    loadData(tab);
}

function logout() { localStorage.removeItem('tok'); location.href = REDIRECT_URI; }

async function boot() {
    if (location.hash) {
        _token = new URLSearchParams(location.hash.substring(1)).get('access_token');
        localStorage.setItem('tok', _token);
        history.replaceState({}, '', REDIRECT_URI);
    }
    if (_token) {
        document.getElementById('s-login').style.display = 'none';
        document.getElementById('s-app').classList.add('on');
        _profData = await spApi('/me');
        document.getElementById('u-av').innerHTML = `<img src="${_profData.images[0].url}" style="width:100%">`;
        loadData('year');
    } else {
        document.getElementById('s-login').classList.add('on');
    }
}
boot();
</script>
</body>
</html>
