<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VibeCheck - Beta</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sp:#1DB954;--sp2:#1ed760;--glow:rgba(29,185,84,.15);
  --bg:#090909;--bg2:#131313;--bg3:#1c1c1c;--bg4:#252525;
  --t:#fff;--t2:#b3b3b3;--t3:#555;
  --r:14px;--f:'DM Sans',-apple-system,sans-serif;--nav:62px
}
html,body{background:var(--bg);color:var(--t);font-family:var(--f);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.scr{display:none;min-height:100vh;flex-direction:column}
.scr.on{display:flex}
#s-login{align-items:center;justify-content:center;padding:48px 24px;text-align:center;position:relative;overflow:hidden}
.l-ico{width:72px;height:72px;margin-bottom:24px;animation:up .5s ease both}
.l-h{font-size:38px;font-weight:900;letter-spacing:-2px;line-height:1.1;margin-bottom:12px;animation:up .5s .07s ease both}
.l-h em{font-style:normal;color:var(--sp)}
.l-p{font-size:15px;color:var(--t2);max-width:280px;line-height:1.65;margin-bottom:38px;animation:up .5s .14s ease both}
.b-sp{display:inline-flex;align-items:center;gap:10px;background:var(--sp);color:#000;font-family:var(--f);font-size:15px;font-weight:800;padding:15px 32px;border-radius:50px;border:none;cursor:pointer;transition:background .15s,transform .12s;animation:up .5s .21s ease both}
.b-sp:hover{background:var(--sp2);transform:scale(1.04)}
.ring{width:42px;height:42px;border:3px solid var(--bg3);border-top-color:var(--sp);border-radius:50%;animation:spin .75s linear infinite}
.rmsg{font-size:13px;color:var(--t2);font-weight:500}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:48px 22px 10px;flex-shrink:0;max-width:500px;width:100%;margin:0 auto}
.tb-b{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:900;letter-spacing:-.5px}
.tb-b svg{width:22px;height:22px}
.tb-r{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--bg4);flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.b-out{background:none;border:1px solid var(--bg4);color:var(--t2);font-family:var(--f);font-size:12px;font-weight:600;padding:5px 12px;border-radius:50px;cursor:pointer;transition:all .15s}
.pill-wrap{padding:2px 22px 14px;max-width:500px;margin:0 auto;position:sticky;top:0;z-index:99;background:var(--bg)}
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.pill{flex-shrink:0;position:relative;border:none;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:700;font-family:var(--f);cursor:pointer;overflow:hidden;white-space:nowrap;transition:transform .12s;background:var(--bg3);color:var(--t2)}
.pill.on{background:var(--sp);color:#000}

.page {
  display: none;
  flex: 1;
  flex-direction: column;
  animation: fi .18s ease;
  height: calc(100vh - 120px); 
  overflow-y: auto !important;
  padding-bottom: 80px;
  -webkit-overflow-scrolling: touch;
}
.page.on{display:flex}
.inn{flex:1;max-width:500px;width:100%;margin:0 auto}
.hero{padding:4px 22px 20px;text-align:center}
#ctr{font-size:clamp(58px,15vw,84px);font-weight:900;letter-spacing:-5px;line-height:1}
.vrow{display:flex;justify-content:center;margin-top:14px}
#vtag{display:inline-flex;align-items:center;gap:7px;background:var(--bg3);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:700}
.dv{height:1px;background:var(--bg3);margin:20px 22px}
.sh{display:flex;align-items:baseline;justify-content:space-between;padding:0 22px 12px}
.st{font-size:18px;font-weight:800}
.alist,.tlist{padding:0 22px}
.ar,.tr{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:12px;margin:0 -10px;transition:background .15s}
.ai,.ti{width:48px;height:48px;border-radius:50%;background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.ai img,.ti img{width:100%;height:100%;object-fit:cover}
.ainf,.tinf{flex:1;min-width:0}
.an,.tn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:13px;font-weight:800;color:var(--sp)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(9,9,9,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;z-index:200}
.bni{max-width:500px;width:100%;display:flex}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--t3);cursor:pointer}
.bn.on{color:var(--sp)}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bnl{font-size:10px;font-weight:700}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 22px;border-bottom:1px solid rgba(255,255,255,.05)}
.lb-row.me{background:rgba(29,185,84,.07)}
.lb-pos{font-size:15px;font-weight:800;width:28px;text-align:center}
.lb-save-btn{width:calc(100% - 44px);padding:14px;border-radius:50px;background:var(--sp);color:#000;font-weight:800;border:none;cursor:pointer;margin:10px 22px}
#nudge-toast{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--sp);color:#000;padding:12px 24px;border-radius:50px;z-index:9999}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="s-login" class="scr">
  <h1 class="l-h">VibeCheck <em>Beta</em></h1>
  <p class="l-p">Connect to see your honest Spotify stats.</p>
  <button class="b-sp" onclick="doLogin()">Connect with Spotify</button>
</div>

<div id="s-load" class="scr">
  <div class="ring"></div>
  <div class="rmsg" id="rmsg">Loading...</div>
</div>

<div id="s-app" class="scr">
  <div class="topbar">
    <div class="tb-b">VibeCheck</div>
    <div class="tb-r">
      <div class="av" id="u-av">?</div>
      <button class="b-out" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="pill-wrap">
    <div class="pills">
      <button class="pill" data-tab="week" onclick="onTab(this,'week')">Week</button>
      <button class="pill" data-tab="month" onclick="onTab(this,'month')">4 Weeks</button>
      <button class="pill" data-tab="medium" onclick="onTab(this,'medium')">6 Months</button>
      <button class="pill on" data-tab="year" onclick="onTab(this,'year')">All Time</button>
    </div>
  </div>

  <div class="page on" id="pg-home">
    <div class="inn">
      <div class="hero">
        <div id="ctr" style="font-size: 70px; font-weight: 900;">0</div>
        <div class="h-unit">Vibe Points</div>
        <div class="vrow"><div id="vtag"><span id="ve">🎵</span> <span id="vt">Calculating...</span></div></div>
      </div>
      <div class="dv"></div>
      <div class="sh"><span class="st">Top Artists</span></div>
      <div class="alist" id="ar-list"></div>
      <div class="dv"></div>
      <div class="sh"><span class="st">Top Tracks</span></div>
      <div class="tlist" id="home-tlist"></div>
    </div>
  </div>

  <div class="page" id="pg-leaderboard">
    <div class="inn">
      <div style="padding:22px">
        <h2 class="st">Leaderboard</h2>
        <input id="lb-status-input" placeholder="What's your vibe?" style="width:100%;background:var(--bg3);border:none;padding:12px;border-radius:10px;color:#fff;margin-top:10px"/>
      </div>
      <button class="lb-save-btn" id="lb-save-btn" onclick="saveMyScore()">💾 Save My Score</button>
      <div id="lb-save-msg" style="text-align:center;font-size:12px;color:var(--sp)"></div>
      <div id="lb-list"></div>
    </div>
  </div>

  <div class="page" id="pg-profile">
    <div class="inn" style="text-align:center;padding-top:40px">
      <div class="av" id="p-av" style="width:100px;height:100px;margin:0 auto;font-size:40px">?</div>
      <h2 id="p-nm" style="margin-top:15px">Mei Mei</h2>
      <div id="p-id" style="color:var(--t2)">@user</div>
      <div class="dv"></div>
      <div style="padding:20px;display:grid;gap:10px">
        <div class="sc" style="background:var(--bg2);padding:15px;border-radius:15px;text-align:left">
           <div style="font-size:12px;color:var(--t2)">Plan</div>
           <div id="p-plan" style="font-weight:800">—</div>
        </div>
        <div class="sc" style="background:var(--bg2);padding:15px;border-radius:15px;text-align:left">
           <div style="font-size:12px;color:var(--t2)">Country</div>
           <div id="p-ctry" style="font-weight:800">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bnav">
    <div class="bni">
      <button class="bn on" id="bn-home" onclick="goPage('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="bnl">Home</span></button>
      <button class="bn" id="bn-leaderboard" onclick="goPage('leaderboard')"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg><span class="bnl">Ranks</span></button>
      <button class="bn" id="bn-profile" onclick="goPage('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="bnl">Profile</span></button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '22a39828c40d4acc8e50f21daaf65639';
const REDIRECT_URI = 'https://s10922-netizen.github.io/vibecheck/test.html';

const firebaseConfig = {
  apiKey: 'AIzaSyBZaTbDIyXOtyLPEtJLLbdOw8L4eSmiNqY',
  databaseURL: 'https://vibecheck-app-7e557-default-rtdb.europe-west1.firebasedatabase.app/',
  projectId: 'vibecheck-app-7e557',
};
firebase.initializeApp(firebaseConfig);
const _db = firebase.database();

let _token = localStorage.getItem('tok');
let _profData = null;
const _tabCache = {};

const $ = id => document.getElementById(id);

async function spApi(path) {
  const r = await fetch('https://api.spotify.com/v1' + path, {
    headers: { Authorization: 'Bearer ' + _token }
  });
  if (r.status === 401) { logout(); return; }
  return r.json();
}

async function doLogin() {
  const scope = 'user-read-private user-read-email user-top-read';
  location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
}

async function loadProfile() {
  _profData = await spApi('/me');
  if (!$('u-nm')) return;
  $('u-av').innerHTML = _profData.images?.[0]?.url ? `<img src="${_profData.images[0].url}"/>` : 'U';
  fillProfile();
}

function fillProfile() {
  if (!_profData) return;
  const p = _profData;
  $('p-av').innerHTML = p.images?.[0]?.url ? `<img src="${p.images[0].url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : p.display_name[0];
  $('p-nm').textContent = p.display_name || p.id;
  $('p-id').textContent = '@' + p.id;
  $('p-plan').textContent = p.product || 'Free';
  $('p-ctry').textContent = p.country || '—';
}

async function loadData(tab) {
  const range = tab === 'week' ? 'short_term' : (tab === 'month' ? 'short_term' : (tab === 'medium' ? 'medium_term' : 'long_term'));
  const tracks = await spApi(`/me/top/tracks?time_range=${range}&limit=50`);
  const artists = await spApi(`/me/top/artists?time_range=${range}&limit=10`);
  
  const points = tracks.items.reduce((acc, t, i) => acc + (50 - i) * 1000, 0);
  _tabCache[tab] = { tracks: tracks.items, artists: artists.items, points };
  render(tab);
}

function render(tab) {
  const data = _tabCache[tab];
  $('ctr').textContent = data.points.toLocaleString();
  $('vt').textContent = data.points > 100000 ? '👑 Music Legend' : '🎧 Vibe Explorer';
  
  $('ar-list').innerHTML = data.artists.map((a, i) => `
    <div class="ar">
      <div class="rk">${i+1}</div>
      <div class="ai">${a.images?.[0]?.url ? `<img src="${a.images[0].url}"/>` : '🎵'}</div>
      <div class="ainf"><div class="an">${a.name}</div></div>
      <div class="am">${(50-i)*100} pts</div>
    </div>
  `).join('');

  $('home-tlist').innerHTML = data.tracks.map((t, i) => `
    <div class="tr">
      <div class="ti">${t.album.images?.[0]?.url ? `<img src="${t.album.images[0].url}"/>` : '🎵'}</div>
      <div class="tinf"><div class="tn">${t.name}</div></div>
    </div>
  `).join('');
}

async function saveMyScore() {
  const tab = 'year';
  if (!_tabCache[tab] || !_profData) return;
  
  const uid = _profData.id;
  const score = _tabCache[tab].points;
  const status = $('lb-status-input').value || "";

  await _db.ref('scores/' + uid).update({
    name: _profData.display_name,
    score: score,
    status: status,
    updatedAt: Date.now()
  });
  
  $('lb-save-msg').textContent = '✅ Score Saved!';
  startLeaderboard();
}

function startLeaderboard() {
  _db.ref('scores').orderByChild('score').limitToLast(100).on('value', snap => {
    const rows = [];
    snap.forEach(c => rows.push({ uid: c.key, ...c.val() }));
    rows.sort((a, b) => b.score - a.score);
    
    $('lb-list').innerHTML = rows.map((r, i) => `
      <div class="lb-row ${r.uid === _profData?.id ? 'me' : ''}">
        <div class="lb-pos">${i+1}</div>
        <div class="lb-info">
          <div class="lb-name">${r.name}</div>
          <div style="font-size:11px;color:var(--t2)">${r.status || ''}</div>
        </div>
        <div class="lb-score">${r.score.toLocaleString()}</div>
      </div>
    `).join('');
  });
}

function goPage(nm) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
  $('pg-' + nm).classList.add('on');
  $('bn-' + nm).classList.add('on');
  if (nm === 'leaderboard') startLeaderboard();
}

function onTab(el, tab) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  loadData(tab);
}

function logout() { localStorage.removeItem('tok'); location.href = REDIRECT_URI; }

async function boot() {
  const hash = location.hash.substring(1);
  if (hash) {
    const params = new URLSearchParams(hash);
    _token = params.get('access_token');
    localStorage.setItem('tok', _token);
    history.replaceState({}, '', REDIRECT_URI);
  }

  if (_token) {
    showScr('s-app');
    await loadProfile();
    loadData('year');
  } else {
    showScr('s-login');
  }
}

function showScr(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
}

boot();
</script>
</body>
</html>
